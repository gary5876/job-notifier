# 이 파일을 복사해 config/secrets.yaml 을 만들고 실제 값으로 채우세요.
#   cp config/secrets.example.yaml config/secrets.yaml
# secrets.yaml 은 .gitignore 처리되어 커밋되지 않습니다. (웹훅 URL 절대 커밋 금지)

discord:
  # 디스코드 채널 → 설정 → 연동 → 웹훅에서 발급한 URL
  webhook_url: "https://discord.com/api/webhooks/XXXXXXXX/XXXXXXXX"
  # 알림 봇 표시 이름
  username: "구직 알리미"
  # 한 번 실행에 보낼 최대 공고 수 (도배 방지)
  max_per_run: 15
